name: Code Quality

on:
  push:
    branches: [main]
    paths:
      - 'xyz/**'
      - '.github/workflows/code-quality.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  code-quality:
    name: Code Quality and Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Typical run: 2-3 min (format, lint, type check, tests). 10 min prevents hanging
    strategy:
      matrix:
        python-version: ['3.11']
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: xyz
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov pytest-asyncio pytest-mock types-grpcio

      - name: Run Ruff formatting check
        working-directory: xyz
        run: ruff format --check .
        if: success() || failure()

      - name: Run Ruff linting
        working-directory: xyz
        run: ruff check --output-format=github .
        if: success() || failure()

      - name: Run MyPy type checking
        working-directory: xyz
        run: mypy app utils pipelines --config-file pyproject.toml
        if: success() || failure()

      - name: Run pytest with coverage
        working-directory: xyz
        run: pytest --cov=app --cov=utils --cov=pipelines --cov-report=term-missing
        if: success() || failure()
