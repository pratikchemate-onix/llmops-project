name: Backend — Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "xyz/**"
      - ".github/workflows/backend-deploy.yml"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: llmops-backend
  IMAGE_URI: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/llmops-repo/llmops-backend
  RUNTIME_SA: llmops-backend-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker image
        working-directory: xyz
        run: |
          docker build -t $IMAGE_URI:${{ github.sha }} -t $IMAGE_URI:latest .
          docker push $IMAGE_URI:${{ github.sha }}
          docker push $IMAGE_URI:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE_URI:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --service-account $RUNTIME_SA \
            --allow-unauthenticated \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars="BIGQUERY_PROJECT=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars="FIRESTORE_PROJECT=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars="RAG_LOCATION=${REGION}" \
            --set-env-vars="GCS_BUCKET_DOCS=${{ secrets.GCP_PROJECT_ID }}-llmops-docs" \
            --set-env-vars="PIPELINE_ROOT_GCS=gs://${{ secrets.GCP_PROJECT_ID }}-llmops-pipeline-artifacts" \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5 \
            --port=8080

      - name: Show backend URL
        run: |
          gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format="value(status.url)"
